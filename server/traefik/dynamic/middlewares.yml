http:
  middlewares:
    # Basic auth — used as fallback while Authelia is being rolled out.
    # Once Authelia is confirmed working on all admin surfaces, this can be removed.
    auth:
      basicAuth:
        users:
          # Dynamic file config uses Traefik Go templates, not ${VAR} expansion.
          - 'admin:{{ env "TRAEFIK_PASSWORD" }}'

    # Authelia forward-auth middleware.
    # Used by any router that should require Authelia authentication.
    # Reference as: authelia@file
    authelia:
      forwardAuth:
        address: "http://authelia:9091/api/authz/forward-auth"
        trustForwardHeader: true
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
          - Remote-Name
          - Remote-Email

    security-headers:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000

tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
        - TLS_AES_128_GCM_SHA256
        - TLS_AES_256_GCM_SHA384
        - TLS_CHACHA20_POLY1305_SHA256
