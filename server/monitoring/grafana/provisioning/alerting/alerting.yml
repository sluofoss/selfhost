apiVersion: 1

# ── Contact Points ────────────────────────────────────────────────────────────
contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram_receiver
        type: telegram
        settings:
          bottoken: "$__env{TELEGRAM_BOT_TOKEN}"
          chatid: "$__env{TELEGRAM_CHAT_ID}"
        disableResolveMessage: false

# ── Notification Policy ───────────────────────────────────────────────────────
policies:
  - orgId: 1
    receiver: telegram

# ── Alert Rules ───────────────────────────────────────────────────────────────
groups:
  - orgId: 1
    name: system-health
    folder: Alerts
    interval: 1m
    rules:

      # Container disappeared from cAdvisor scrape for 2+ minutes
      - uid: container_down_rule
        title: Container Down
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: absent_over_time(container_last_seen{name=~"seafile|seafile_db|couchdb|traefik|immich_server"}[3m])
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 0s
        annotations:
          summary: "Container {{ $labels.name }} is down (absent from cAdvisor for >3 min)"

      # Any non-tmpfs/overlay filesystem below 15% free
      - uid: low_disk_space_rule
        title: Low Disk Space
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >
                node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
                / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}
                < 0.15
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: >
            Disk space below 15% on {{ $labels.mountpoint }}
            ({{ printf "%.1f" (mulf $values.A 100) }}% free)

      # Available memory below 2 GB
      - uid: low_memory_rule
        title: Low Memory
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: node_memory_MemAvailable_bytes < 2000000000
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: >
            Available memory below 2 GB
            ({{ printf "%.1f" (divf $values.A 1073741824) }} GB free)
