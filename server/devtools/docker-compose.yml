name: devtools

services:
  code-server:
    image: codercom/code-server:latest
    container_name: devtools_code_server
    env_file:
      - .env
    environment:
      PASSWORD: ${CODE_SERVER_PASSWORD}
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 1g
    volumes:
      - ${DEVTOOLS_PROJECTS_PATH:-/data/devtools/projects}:/home/coder/project
      - ${CODE_SERVER_BASE_PATH:-/data/devtools/code-server}/config:/home/coder/.config
      - ${CODE_SERVER_BASE_PATH:-/data/devtools/code-server}/data:/home/coder/.local/share/code-server
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devtools-code-server.rule=Host(`vscode.${DOMAIN}`)"
      - "traefik.http.routers.devtools-code-server.entrypoints=websecure"
      - "traefik.http.routers.devtools-code-server.tls.certresolver=letsencrypt"
      - "traefik.http.services.devtools-code-server.loadbalancer.server.port=8080"

  ollama:
    image: ollama/ollama:latest
    container_name: devtools_ollama
    env_file:
      - .env
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE}
    restart: unless-stopped
    mem_limit: 8g
    mem_reservation: 4g
    volumes:
      - ${OLLAMA_DATA_PATH:-/data/devtools/ollama}:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - default
    labels:
      - "traefik.enable=false"

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: devtools_filebrowser
    environment:
      FB_NOAUTH: "true"
      PUID: ${DEVTOOLS_PUID:-1000}
      PGID: ${DEVTOOLS_PGID:-1000}
    command:
      - "--address"
      - "0.0.0.0"
      - "--port"
      - "80"
      - "--database"
      - "/config/filebrowser.db"
      - "--root"
      - "/srv"
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 128m
    volumes:
      - ${DEVTOOLS_PROJECTS_PATH:-/data/devtools/projects}:/srv
      - ${FILEBROWSER_DATA_PATH:-/data/devtools/filebrowser}:/config
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devtools-filebrowser.rule=Host(`files.${DOMAIN}`)"
      - "traefik.http.routers.devtools-filebrowser.entrypoints=websecure"
      - "traefik.http.routers.devtools-filebrowser.tls.certresolver=letsencrypt"
      - "traefik.http.routers.devtools-filebrowser.middlewares=auth@file"
      - "traefik.http.services.devtools-filebrowser.loadbalancer.server.port=80"

networks:
  default:
  proxy:
    external: true
    name: proxy
